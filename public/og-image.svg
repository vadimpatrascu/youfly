<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c4a6e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Airplane icon -->
  <text x="600" y="220" font-family="Arial,sans-serif" font-size="120" text-anchor="middle" fill="white" opacity="0.9">✈</text>

  <!-- Main title -->
  <text x="600" y="360" font-family="Arial,sans-serif" font-size="80" font-weight="bold" text-anchor="middle" fill="white">YouFly</text>

  <!-- Subtitle -->
  <text x="600" y="440" font-family="Arial,sans-serif" font-size="32" text-anchor="middle" fill="#bae6fd">Zboruri ieftine din Chișinău</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="white" opacity="0.1"/>
  <text x="600" y="610" font-family="Arial,sans-serif" font-size="22" text-anchor="middle" fill="white" opacity="0.8">youfly-xi.vercel.app</text>
</svg>
